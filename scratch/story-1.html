<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; }
body {
  background: #D4B896;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 120px 80px;
  font-family: 'Montserrat', sans-serif;
  position: relative;
}
.logo {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 28px;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: #911B1E;
}
.big-number {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 200px;
  color: #911B1E;
  line-height: 1;
  margin-bottom: 20px;
}
.big-unit {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 52px;
  color: #911B1E;
  margin-bottom: 60px;
}
.body-text {
  font-size: 40px;
  color: #222;
  line-height: 1.6;
  max-width: 900px;
}
.highlight { font-weight: 700; color: #911B1E; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="logo">ALPA</div>
<div class="big-number">500.000</div>
<div class="big-unit">hectáreas quemadas al año</div>
<p class="body-text">en Argentina. El productor no tiene<br>señal en su lote, no tiene alerta temprana.<br><span class="highlight">El fuego no avisa.</span></p>
</body>
</html>
