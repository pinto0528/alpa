<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; }
body {
  background: #222;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 120px 80px;
  font-family: 'Montserrat', sans-serif;
  position: relative;
}
.logo {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 28px;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: #D4B896;
}
.title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 72px;
  color: #D4B896;
  margin-bottom: 80px;
  line-height: 1.2;
}
.feature {
  margin-bottom: 44px;
  text-align: center;
}
.feature-text {
  font-size: 44px;
  color: #F5F5F5;
  line-height: 1.4;
  font-weight: 700;
}
.feature-sub {
  font-size: 28px;
  color: rgba(245,245,245,.7);
  line-height: 1.4;
  margin-top: 6px;
}
.feature-divider {
  width: 32px;
  height: 3px;
  background: #911B1E;
  margin: 0 auto 22px;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="logo">ALPA</div>
<div class="title">Detección en<br>menos de 5 min</div>
<div class="feature-divider"></div>
<div class="feature">
  <div class="feature-text">Sin electricidad</div>
  <div class="feature-sub">Panel solar + batería</div>
</div>
<div class="feature-divider"></div>
<div class="feature">
  <div class="feature-text">Sin señal</div>
  <div class="feature-sub">Radio LoRa + punto de salida</div>
</div>
<div class="feature-divider"></div>
<div class="feature">
  <div class="feature-text">Sin técnico</div>
  <div class="feature-sub">Se coloca en 15 minutos</div>
</div>
</body>
</html>
