<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1920px; overflow: hidden; }
body {
  background: #911B1E;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 120px 80px;
  font-family: 'Montserrat', sans-serif;
  position: relative;
}
.logo {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 28px;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: #D4B896;
}
.icon-big {
  font-family: 'Playfair Display', serif;
  font-size: 120px;
  line-height: 1;
  margin-bottom: 40px;
  color: rgba(255,255,255,.2);
}
.title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 72px;
  color: #F5F5F5;
  margin-bottom: 32px;
  line-height: 1.2;
}
.body-text {
  font-size: 40px;
  color: rgba(255,255,255,.9);
  line-height: 1.6;
  max-width: 850px;
}
.tagline {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 44px;
  color: #D4B896;
  margin-top: 56px;
  letter-spacing: 2px;
}
.line {
  width: 60px;
  height: 3px;
  background: #D4B896;
  margin: 36px auto;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="logo">ALPA</div>
<div class="icon-big">~</div>
<div class="title">Tu campo,<br>siempre vigilado</div>
<p class="body-text">Alerta con coordenadas exactas<br>directo a tu celular. Estés donde estés.</p>
<div class="line"></div>
<div class="tagline">Cuidamos tu campo</div>
</body>
</html>
